<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>임분밀도진단카드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
--bg:#f5f4f0;--card:#ffffff;--text:#1a1a1a;--sub:#555;--hint:#999;
--border:#e0ddd6;
--red:#d63031;--orange:#e17a00;--green:#27ae60;--blue:#2e86de;
--red-bg:#ffeaea;--orange-bg:#fff4e0;--green-bg:#e8f8ef;--blue-bg:#e6f0fb;
}
@media(prefers-color-scheme:dark){
:root{
--bg:#1a1917;--card:#262523;--text:#e8e6e1;--sub:#a09d95;--hint:#706d66;
--border:#3a3835;
--red-bg:#3d1a1a;--orange-bg:#3d2d10;--green-bg:#1a3325;--blue-bg:#1a2a3d;
}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
.app{max-width:580px;margin:0 auto;padding:16px 12px 48px}
.title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.title-row h1{font-size:17px;font-weight:700}
.title-row .org{font-size:10px;color:var(--hint);text-align:right;line-height:1.4}

.controls{
background:var(--card);border-radius:10px;padding:14px;
border:1px solid var(--border);margin-bottom:14px;
display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;
}
.ctrl-group{flex:1;min-width:120px}
.ctrl-group label{display:block;font-size:12px;color:var(--sub);margin-bottom:4px;font-weight:500}
.ctrl-group .input-row{display:flex;align-items:center;gap:4px}
.ctrl-group input[type=number]{
width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;
font-size:18px;font-weight:700;font-family:inherit;
background:var(--bg);color:var(--text);outline:none;
-moz-appearance:textfield;
}
.ctrl-group input[type=number]::-webkit-inner-spin-button,
.ctrl-group input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
.ctrl-group input[type=number]:focus{border-color:var(--blue)}
.ctrl-group .unit{font-size:13px;color:var(--sub);white-space:nowrap}
.ctrl-group input[type=range]{
width:100%;-webkit-appearance:none;appearance:none;height:5px;
background:var(--border);border-radius:3px;outline:none;margin-top:6px;
}
.ctrl-group input[type=range]::-webkit-slider-thumb{
-webkit-appearance:none;width:22px;height:22px;border-radius:50%;
background:var(--text);cursor:pointer;border:2px solid var(--card);
}

.legend{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.legend .li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--sub);padding:3px 8px;background:var(--card);border-radius:14px;border:1px solid var(--border)}
.legend .li .d{width:9px;height:9px;border-radius:2px}

.card-scale{
background:var(--card);border-radius:10px;padding:12px;
border:1px solid var(--border);user-select:none;
}

.row-label{font-size:11px;color:var(--sub);font-weight:700;padding-left:2px}
.row-label-top{margin-bottom:1px}
.row-label-bottom{margin-top:1px}

.tick-row{position:relative;height:18px}
.tick-row .tk{position:absolute;transform:translateX(-50%);font-size:10px;color:var(--sub);font-weight:500}

.bar-wrap{position:relative;margin-top:4px}
.bar-outer{
height:42px;border-radius:6px;overflow:hidden;
cursor:crosshair;position:relative;touch-action:none;
}
.bar-outer .seg{
position:absolute;top:0;height:100%;
display:flex;align-items:center;justify-content:center;
font-size:12px;font-weight:700;color:#fff;
overflow:hidden;white-space:nowrap;
}

.bnd-row{position:relative;height:20px;margin-bottom:4px}
.bnd-row .bl{position:absolute;transform:translateX(-50%);font-size:10px;font-weight:700;white-space:nowrap}

.d-tick-row{position:relative;height:18px}
.d-tick-row .dtk{position:absolute;transform:translateX(-50%);font-size:10px;color:var(--sub);font-weight:500}

.probe{
position:absolute;top:0;width:2.5px;background:var(--text);
z-index:20;pointer-events:none;height:42px;border-radius:1px;
}
.probe::before{content:'';position:absolute;top:-6px;left:-5px;width:12px;height:12px;background:var(--text);clip-path:polygon(50% 100%,0 0,100% 0)}
.probe-lbl{
position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);
white-space:nowrap;font-size:11px;font-weight:700;
background:var(--card);border:1px solid var(--border);
border-radius:6px;padding:1px 7px;pointer-events:none;
}

.result{
border-radius:10px;padding:12px;margin-top:12px;
border:2px solid var(--border);transition:all 0.2s;
display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:center;
}
.result .rc{text-align:center;flex:1;min-width:70px}
.result .rc .rl{font-size:10px;color:var(--sub)}
.result .rc .rv{font-size:18px;font-weight:700}
.result .rc .ru{font-size:10px;color:var(--sub)}
.result .verdict{
width:100%;text-align:center;padding-top:8px;
border-top:1px solid var(--border);margin-top:4px;
}
.result .verdict .vg{font-size:20px;font-weight:700}
.result .verdict .va{font-size:13px;font-weight:500}

.hint{font-size:10px;color:var(--hint);margin-top:14px;text-align:center;line-height:1.6}
</style>
</head>
<body>
<div class="app">

<div class="title-row">
<h1>임분밀도진단카드</h1>
<div class="org">국립산림과학원<br>산림기술경영연구소</div>
</div>

<div class="controls">
<div class="ctrl-group">
<label>우세목 평균 수고</label>
<div class="input-row">
<input type="number" id="hInput" value="15" min="5" max="30" step="0.5">
<div class="unit">m</div>
</div>
<input type="range" id="hSlider" min="5" max="30" step="0.5" value="15">
</div>
<div class="ctrl-group">
<label>ha당 본수</label>
<div class="input-row">
<input type="number" id="nInput" value="" min="50" max="4000" step="1" placeholder="입력">
<div class="unit">본/ha</div>
</div>
</div>
</div>

<div class="legend">
<div class="li"><div class="d" style="background:#d63031"></div>초과밀 Sr≤14</div>
<div class="li"><div class="d" style="background:#e17a00"></div>과밀 15~17</div>
<div class="li"><div class="d" style="background:#27ae60"></div>적정 18~21</div>
<div class="li"><div class="d" style="background:#2e86de"></div>소밀 Sr≥22</div>
</div>

<div class="card-scale">

<div class="row-label row-label-top">ha당 본수</div>
<div class="tick-row" id="nTicks"></div>

<div class="bar-wrap">
<div class="bar-outer" id="bar"></div>
<div class="probe" id="probe" style="display:none"><div class="probe-lbl" id="probeLbl"></div></div>
</div>

<div class="bnd-row" id="bndRow"></div>

<div class="d-tick-row" id="distTicks"></div>
<div class="row-label row-label-bottom">평균간거리 (m)</div>

</div>

<div class="result" id="resultBox">
<div class="rc"><div class="rl">ha당 본수</div><div class="rv" id="rN">—</div><div class="ru">본/ha</div></div>
<div class="rc"><div class="rl">평균간거리</div><div class="rv" id="rDist">—</div><div class="ru">m</div></div>
<div class="rc"><div class="rl">Sr 지수</div><div class="rv" id="rSr">—</div></div>
<div class="verdict">
<div class="vg" id="rGrade">바를 터치하거나 본수를 입력하세요</div>
<div class="va" id="rAction"></div>
</div>
</div>

<div class="hint">
Sr = √(10000÷N) ÷ H × 100 · 침엽수 범용 기준<br>
바를 터치/드래그하거나 ha당 본수를 직접 입력
</div>
</div>

<script>
var hSlider=document.getElementById('hSlider'),hInput=document.getElementById('hInput'),nInput=document.getElementById('nInput');
var bar=document.getElementById('bar'),probe=document.getElementById('probe'),probeLbl=document.getElementById('probeLbl');
var nTicksEl=document.getElementById('nTicks'),bndRow=document.getElementById('bndRow'),distTicksEl=document.getElementById('distTicks');
var rN=document.getElementById('rN'),rDist=document.getElementById('rDist'),rSr=document.getElementById('rSr');
var rGrade=document.getElementById('rGrade'),rAction=document.getElementById('rAction'),resultBox=document.getElementById('resultBox');

var G=[
{name:'초과밀',sr:[0,14],col:'#d63031',bg:'var(--red-bg)',act:'즉시 솎아베기 필요'},
{name:'과밀',sr:[14.01,17],col:'#e17a00',bg:'var(--orange-bg)',act:'솎아베기 시행 권장'},
{name:'적정',sr:[17.01,21],col:'#27ae60',bg:'var(--green-bg)',act:'현상 유지'},
{name:'소밀',sr:[21.01,999],col:'#2e86de',bg:'var(--blue-bg)',act:'보식 검토'}
];

var NMIN=50,NMAX=4000;
var logMin=Math.log10(NMIN),logMax=Math.log10(NMAX);

function nToPos(n){return(logMax-Math.log10(Math.max(NMIN,Math.min(NMAX,n))))/(logMax-logMin)*100}
function posToN(p){return Math.pow(10,logMax-p/100*(logMax-logMin))}
function srCalc(n,h){return Math.sqrt(10000/n)/h*100}
function nFromSr(sr,h){var d=sr*h/100;return 10000/(d*d)}
function distCalc(n){return Math.sqrt(10000/n)}
function getG(sr){if(sr<=14)return G[0];if(sr<=17)return G[1];if(sr<=21)return G[2];return G[3]}
function getH(){return parseFloat(hInput.value)||15}

function buildBar(){
var h=getH();
var srB=[14,17,21];
var nB=srB.map(function(s){return nFromSr(s,h)});

var segs=[
{col:G[0].col,nHi:NMAX,nLo:nB[0],label:'초과밀'},
{col:G[1].col,nHi:nB[0],nLo:nB[1],label:'과밀'},
{col:G[2].col,nHi:nB[1],nLo:nB[2],label:'적정'},
{col:G[3].col,nHi:nB[2],nLo:NMIN,label:'소밀'}
];
var bhtml='';
segs.forEach(function(s){
var cH=Math.min(s.nHi,NMAX),cL=Math.max(s.nLo,NMIN);
if(cH<=cL)return;
var l=nToPos(cH),r=nToPos(cL),w=r-l;
bhtml+='<div class="seg" style="left:'+l+'%;width:'+w+'%;background:'+s.col+'">'+s.label+'</div>';
});
bar.innerHTML=bhtml;

var nTVals=[100,200,300,500,800,1000,1500,2000,3000];
var th='';
nTVals.forEach(function(v){
if(v>=NMIN&&v<=NMAX){
var overlap=false;
nB.forEach(function(nb){if(Math.abs(v-Math.round(nb))<v*0.15)overlap=true});
if(!overlap){
th+='<div class="tk" style="left:'+nToPos(v)+'%">'+v.toLocaleString()+'</div>';
}
}
});
nTicksEl.innerHTML=th;

var bh='';
var bCols=[G[0].col,G[1].col,G[2].col];
nB.forEach(function(nb,i){
if(nb>=NMIN&&nb<=NMAX){
bh+='<div class="bl" style="left:'+nToPos(nb)+'%;color:'+bCols[i]+'">▲'+Math.round(nb).toLocaleString()+'</div>';
}
});
bndRow.innerHTML=bh;

var dVals=[2,2.5,3,3.5,4,5,6,7,8,10];
var dh='';
dVals.forEach(function(dv){
var nf=10000/(dv*dv);
if(nf>=NMIN&&nf<=NMAX){
dh+='<div class="dtk" style="left:'+nToPos(nf)+'%">'+dv+'</div>';
}
});
distTicksEl.innerHTML=dh;

var nv=parseInt(nInput.value);
if(nv>=NMIN&&nv<=NMAX)showAt(nv);
}

function showAt(n){
var h=getH();
var sr=srCalc(n,h);
var dist=distCalc(n);
var g=getG(sr);
var p=nToPos(n);

probe.style.display='block';
probe.style.left=p+'%';
probeLbl.textContent=Math.round(n).toLocaleString()+'본 → '+g.name;

rN.textContent=Math.round(n).toLocaleString();
rDist.textContent=dist.toFixed(2);
rSr.textContent=sr.toFixed(1);
rSr.style.color=g.col;
rGrade.textContent=g.name+' 밀도';
rGrade.style.color=g.col;
rAction.textContent=g.act;
rAction.style.color=g.col;
resultBox.style.background=g.bg;
resultBox.style.borderColor=g.col;
}

function getPct(e){
var rect=bar.getBoundingClientRect();
var cx=e.touches?e.touches[0].clientX:e.clientX;
return Math.max(0,Math.min(100,(cx-rect.left)/rect.width*100));
}

function onBar(e){
var p=getPct(e);
var n=Math.round(posToN(p));
nInput.value=n;
showAt(n);
}

var dragging=false;
bar.addEventListener('mousedown',function(e){dragging=true;onBar(e)});
bar.addEventListener('mouseenter',function(e){if(!dragging)onBar(e)});
bar.addEventListener('mousemove',function(e){onBar(e)});
document.addEventListener('mousemove',function(e){if(dragging)onBar(e)});
document.addEventListener('mouseup',function(){dragging=false});
bar.addEventListener('touchstart',function(e){e.preventDefault();dragging=true;onBar(e)},{passive:false});
document.addEventListener('touchmove',function(e){if(dragging)onBar(e)});
document.addEventListener('touchend',function(){dragging=false});

hInput.addEventListener('input',function(){
var v=parseFloat(hInput.value);
if(v>=5&&v<=30)hSlider.value=v;
buildBar();
});
hSlider.addEventListener('input',function(){
hInput.value=hSlider.value;
buildBar();
});
nInput.addEventListener('input',function(){
var v=parseInt(nInput.value);
if(v>=NMIN&&v<=NMAX)showAt(v);
});

buildBar();
</script>
</body>
</html>
